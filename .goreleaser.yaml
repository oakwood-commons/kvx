version: 2
builds:
  - env:
      - CGO_ENABLED=0
    main: .
    binary: "kvx"
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
          - -w
          - -s
          - -X main.Version={{.Version}}
          - -X main.Commit={{.Commit}}
          - -X main.BuildTime={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
archives:
  - name_template: >-
      {{- .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}
    format_overrides:
      - goos: windows
        formats: ['zip']
checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    args:
      - "sign-blob"
      - "${artifact}"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "--yes"
sboms:
  - artifacts: archive
homebrew_casks:
  - name: kvx
    repository:
      owner: oakwood-commons
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/oakwood-commons/kvx"
    description: "Terminal-based UI for exploring structured data interactively"
    license: "Apache-2.0"
release:
  draft: false
  prerelease: auto
changelog:
  sort: asc
  use: git
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "🚜 Refactor"
      regexp: '^.*?refactor(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "📚 Documentation"
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: "⚡ Performance"
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 4
    - title: "⚙️ Miscellaneous"
      regexp: '^.*?(chore|ci|build|style|test)(\([[:word:]]+\))??!?:.+$'
      order: 5
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^Merge "
      - "^Initial commit"
