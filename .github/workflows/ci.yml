name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yaml'
              - '.github/workflows/ci.yml'
              - 'taskfile.yaml'

  fork-test:
    name: Fork Test
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      needs.changes.outputs.code == 'true' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x

      - name: Run tests
        run: task test

  fork-test-windows:
    name: Fork Test (Windows)
    runs-on: windows-latest
    needs: [changes]
    if: |
      needs.changes.outputs.code == 'true' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x

      - name: Run tests
        run: task test

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      needs.changes.outputs.code == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.fork == false)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x

      - name: Run tests with coverage
        run: task coverage

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          fail_ci_if_error: false

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    needs: [changes]
    if: |
      needs.changes.outputs.code == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.fork == false)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x

      - name: Run tests
        run: task test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      needs.changes.outputs.code == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.fork == false)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x

      - name: Run linter
        run: task lint

      - name: Check go mod tidy
        run: task mod-check

      - name: Run govulncheck
        run: task govulncheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [changes, test, lint]
    if: |
      always() &&
      needs.changes.outputs.code == 'true' &&
      (needs.test.result == 'success' && needs.lint.result == 'success') &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.fork == false)
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w" -o /dev/null .

  # Gate jobs — always run so required status checks never stay "Pending"
  # when code-only jobs are skipped on docs-only changes.
  test-gate:
    name: Test (gate)
    runs-on: ubuntu-latest
    needs: [changes, test, test-windows, fork-test, fork-test-windows]
    if: always()
    steps:
      - run: |
          if [[ "${{ needs.changes.outputs.code }}" != "true" ]]; then
            echo "No code changes — skipping tests"
            exit 0
          fi
          # Fork PRs: require both Linux and Windows fork tests
          if [[ "${{ needs.fork-test.result }}" == "success" && "${{ needs.fork-test-windows.result }}" == "success" ]]; then
            exit 0
          fi
          # Non-fork: require both Linux and Windows tests
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.test-windows.result }}" == "success" ]]; then
            exit 0
          fi
          echo "Test job failed or was not successful"
          exit 1

  lint-gate:
    name: Lint (gate)
    runs-on: ubuntu-latest
    needs: [changes, lint, fork-test]
    if: always()
    steps:
      - run: |
          if [[ "${{ needs.changes.outputs.code }}" != "true" ]]; then
            echo "No code changes — skipping lint"
            exit 0
          fi
          if [[ "${{ needs.lint.result }}" == "success" ]]; then
            exit 0
          fi
          # Fork PRs skip lint (no secrets access); pass if fork-test succeeded
          if [[ "${{ needs.fork-test.result }}" == "success" ]]; then
            echo "Fork PR — lint skipped, fork-test passed"
            exit 0
          fi
          echo "Lint job failed or was not successful"
          exit 1
