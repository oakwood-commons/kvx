name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write # Required for cosign keyless signing via OIDC

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x

      - name: Run tests
        run: task test

      - name: Run linter
        run: task lint

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x

      - name: Run tests
        run: task test

  release:
    name: Release
    needs: [test, test-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate Homebrew tap token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.OC_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.OC_AUTOMATION_APP_PRIVATE_KEY }}
          owner: oakwood-commons
          repositories: homebrew-tap

      - name: Generate winget token
        id: winget-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.OC_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.OC_AUTOMATION_APP_PRIVATE_KEY }}
          owner: oakwood-commons
          repositories: winget-pkgs

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          WINGET_GITHUB_TOKEN: ${{ steps.winget-token.outputs.token }}

      - name: Submit winget PR
        if: success()
        env:
          WINGET_PR_PAT: ${{ secrets.WINGET_PR_PAT }}
          GH_TOKEN: ${{ secrets.WINGET_PR_PAT }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          BRANCH="kvx-${VERSION}"

          # Skip prerelease tags (goreleaser skips winget for prereleases)
          if [[ "$VERSION" == *-* ]]; then
            echo "::notice::Skipping winget PR for prerelease version $VERSION"
            exit 0
          fi

          if [ -z "$WINGET_PR_PAT" ]; then
            echo "::warning::No WINGET_PR_PAT secret found. Winget PR must be submitted manually."
            echo "::notice::Run locally: task winget-pr"
            exit 0
          fi

          echo "Creating winget PR with token..."
          BODY_FILE="$(mktemp)"
          printf '## Automated winget manifest update\n\nRelease: https://github.com/oakwood-commons/kvx/releases/tag/%s\n' "$TAG" > "$BODY_FILE"

          if gh pr create \
            --repo microsoft/winget-pkgs \
            --head "oakwood-commons:$BRANCH" \
            --base master \
            --title "New version: OakwoodCommons.kvx version $VERSION" \
            --body-file "$BODY_FILE"; then
            echo "::notice::Winget PR created successfully."
          else
            echo "::warning::Failed to create winget PR. It may already exist or there was a transient API issue. Submit manually with: task winget-pr"
          fi
          rm -f "$BODY_FILE"
