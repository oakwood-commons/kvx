name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write # Required for cosign keyless signing via OIDC

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x

      - name: Run tests
        run: task test

      - name: Run linter
        run: task lint

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x

      - name: Run tests
        run: task test

  release:
    name: Release
    needs: [test, test-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1

      - name: Generate Homebrew tap token
        id: app-token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2.0.6
        with:
          app-id: ${{ vars.OC_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.OC_AUTOMATION_APP_PRIVATE_KEY }}
          owner: oakwood-commons
          repositories: homebrew-tap

      - name: Generate winget token
        id: winget-token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2.0.6
        with:
          app-id: ${{ vars.OC_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.OC_AUTOMATION_APP_PRIVATE_KEY }}
          owner: oakwood-commons
          repositories: winget-pkgs

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          WINGET_GITHUB_TOKEN: ${{ steps.winget-token.outputs.token }}

      - name: Submit winget PR
        if: success()
        env:
          WINGET_PR_PAT: ${{ secrets.WINGET_PR_PAT }}
          GH_TOKEN: ${{ secrets.WINGET_PR_PAT }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          BRANCH="kvx-${VERSION}"

          # Skip prerelease tags (goreleaser skips winget for prereleases)
          if [[ "$VERSION" == *-* ]]; then
            echo "::notice::Skipping winget PR for prerelease version $VERSION"
            exit 0
          fi

          if [ -z "$WINGET_PR_PAT" ]; then
            echo "::warning::No WINGET_PR_PAT secret found. Winget PR must be submitted manually."
            echo "::notice::Run locally: task winget-pr"
            exit 0
          fi

          echo "Creating winget PR with token..."
          BODY_FILE="$(mktemp)"
          printf '## Automated winget manifest update\n\nRelease: https://github.com/oakwood-commons/kvx/releases/tag/%s\n' "$TAG" > "$BODY_FILE"

          if gh pr create \
            --repo microsoft/winget-pkgs \
            --head "oakwood-commons:$BRANCH" \
            --base master \
            --title "New version: OakwoodCommons.kvx version $VERSION" \
            --body-file "$BODY_FILE"; then
            echo "::notice::Winget PR created successfully."
          else
            echo "::warning::Failed to create winget PR. It may already exist or there was a transient API issue. Submit manually with: task winget-pr"
          fi
          rm -f "$BODY_FILE"
